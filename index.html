        .container {

        <style>
            /* 定义打字效果的样式 */
            .typing-animation {
                overflow: hidden; /* 隐藏溢出的文字 */
                white-space: nowrap; /* 禁止换行 */
                border-right: 0.15em solid #000; /* 光标样式 */
                animation: typing 3s steps(30, end), blink-caret 0.5s step-end infinite; /* 打字动画和光标闪烁动画 */
            }
    
            /* 定义打字动画的关键帧 */
            @keyframes typing {
                from {
                    width: 0;
                }
                to {
                    width: 100%;
                }
            }
    
            /* 定义光标闪烁的动画 */
            @keyframes blink-caret {
                from,
                to {
                    border-color: transparent;
                }
                50% {
                    border-color: #000;
                }
            }
    
            /* 定义倒退效果的样式 */
            .backspace-animation {
                overflow: hidden; /* 隐藏溢出的文字 */
                white-space: nowrap; /* 禁止换行 */
                border-right: 0.15em solid #000; /* 光标样式 */
                animation: backspace 1s steps(30, end), blink-caret 0.5s step-end infinite; /* 倒退动画和光标闪烁动画 */
            }
    
            /* 定义倒退动画的关键帧 */
            @keyframes backspace {
                from {
                    width: 100%;
                }
                to {
                    width: 0;
                }
            }
        </style>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                var span = document.querySelector(".typing-animation");
                var texts = ["～(∠・ω< )⌒☆", "ヾ(≧▽≦*)o"]; // 这里是要显示的文字
                var index = 0;
                var forward = true;
    
                function typeWriter() {
                    var text = texts[index];
    
                    if (forward) {
                        var j = 0;
                        var typingInterval = setInterval(function() {
                            span.textContent += text.charAt(j);
                            j++;
                            if (j === text.length) {
                                clearInterval(typingInterval);
                                forward = false;
                                setTimeout(function() {
                                    typeWriter();
                                }, 3000); // 等待3秒后开始倒退
                            }
                        }, 100);
                    } else {
                        var k = text.length - 1;
                        var backspaceInterval = setInterval(function() {
                            span.textContent = span.textContent.slice(0, -1);
                            k--;
                            if (k < 0) {
                                clearInterval(backspaceInterval);
                                forward = true;
                                index = (index + 1) % texts.length;
                                setTimeout(function() {
                                    typeWriter();
                                }, 1000); // 等待1秒后开始打字
                            }
                        }, 100);
                    }
                }
    
                typeWriter();
            });
        </script>
</head>
