<!DOCTYPE html>
<html>
<head>
<title>更多 - ZeAy</title>
<meta charset="utf-8">
<style>
.dropbtn {
    background-color: #4CAF50;
    color: white;
    padding: 16px;
    font-size: 16px;
    border: none;
    cursor: pointer;
}

.dropdown {
    position: relative;
    display: inline-block;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: #f9f9f9;
    min-width: 160px;
    box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
}

.dropdown-content a {
    color: black;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
}

.dropdown-content a:hover {background-color: #f1f1f1}

.dropdown:hover .dropdown-content {
    display: block;
}

.dropdown:hover .dropbtn {
    background-color: #3e8e41;
}
</style>
</head>
<body>

<div class="dropdown">
  <button class="dropbtn">小游戏</button>
  <div class="dropdown-content">
    <a href="./a/yx/sc/">3D 赛车</a>
    <a href="./a/yx/sl/">扫雷小游戏</a>
  </div>
</div>
	
	<div class="dropdown">
  <button class="dropbtn">工具</button>
  <div class="dropdown-content">
    <a href="./a/ms/">网易云音乐</a>
  </div>
</div>

</body>
</html>
